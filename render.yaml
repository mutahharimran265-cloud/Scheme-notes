# Render Blueprint — deploy SchemNotes as a real website in a few clicks.
#
#   Render dashboard → New → Blueprint → connect this repo → Apply.
#   Render then builds the Dockerfile, provisions Postgres, mounts a disk for
#   uploaded schematics, and generates AUTH_SECRET automatically.
#
# Note: a persistent disk requires a paid instance ("starter"), so a production
# deploy costs a few $/month. See DEPLOY.md for other hosts (Railway, Fly, VPS).
services:
  - type: web
    name: schemnotes
    runtime: docker
    dockerfilePath: ./Dockerfile
    plan: starter            # required for the persistent disk below
    healthCheckPath: /api/health
    disk:
      name: uploads
      mountPath: /app/public/uploads
      sizeGB: 1
    envVars:
      - key: DB_PROVIDER
        value: postgresql
      - key: DATABASE_URL
        fromDatabase:
          name: schemnotes-db
          property: connectionString
      - key: AUTH_SECRET
        generateValue: true            # Render generates a strong secret
      - key: SCHEMNOTES_PLAN
        value: pro                     # unlock cloud sync / API tokens on this deploy
      - key: NEXT_PUBLIC_APP_URL
        sync: false                    # optional: set to your https://<app>.onrender.com URL

databases:
  - name: schemnotes-db
    plan: free                         # free Postgres for testing (expires); upgrade for production
