<svg xmlns="http://www.w3.org/2000/svg" width="1000" height="640" viewBox="0 0 1000 640">
  <rect width="1000" height="640" fill="#ffffff"/>
  <rect x="12" y="12" width="976" height="616" fill="none" stroke="#cbd5e1" stroke-width="2"/>
  <text x="34" y="48" font-family="ui-monospace, monospace" font-size="22" fill="#0f172a">Power supply — rev B</text>
  <text x="820" y="612" font-family="ui-monospace, monospace" font-size="13" fill="#94a3b8">SchemNotes demo</text>

  <!-- 9V source -->
  <text x="60" y="300" font-family="ui-monospace, monospace" font-size="16" fill="#0f172a">9V</text>
  <line x1="120" y1="150" x2="120" y2="470" stroke="#1e293b" stroke-width="3"/>
  <line x1="100" y1="300" x2="140" y2="300" stroke="#1e293b" stroke-width="3"/>
  <line x1="110" y1="330" x2="130" y2="330" stroke="#1e293b" stroke-width="3"/>

  <!-- Top rail -->
  <line x1="120" y1="150" x2="520" y2="150" stroke="#1e293b" stroke-width="3"/>

  <!-- R1 -->
  <text x="288" y="118" font-family="ui-monospace, monospace" font-size="16" fill="#b91c1c">R1  1k</text>
  <polyline points="255,150 270,135 285,165 300,135 315,165 330,135 345,150" fill="none" stroke="#1e293b" stroke-width="3"/>

  <!-- to node -->
  <line x1="520" y1="150" x2="520" y2="320" stroke="#1e293b" stroke-width="3"/>

  <!-- C1 -->
  <text x="548" y="245" font-family="ui-monospace, monospace" font-size="16" fill="#1d4ed8">C1 100nF</text>
  <line x1="490" y1="235" x2="550" y2="235" stroke="#1e293b" stroke-width="3"/>
  <line x1="490" y1="258" x2="550" y2="258" stroke="#1e293b" stroke-width="3"/>
  <line x1="520" y1="150" x2="520" y2="235" stroke="#1e293b" stroke-width="3"/>

  <!-- U1 block -->
  <rect x="600" y="270" width="120" height="100" fill="none" stroke="#1e293b" stroke-width="3"/>
  <text x="612" y="326" font-family="ui-monospace, monospace" font-size="16" fill="#0f172a">U1 REG</text>
  <line x1="520" y1="320" x2="600" y2="320" stroke="#1e293b" stroke-width="3"/>
  <line x1="720" y1="320" x2="840" y2="320" stroke="#1e293b" stroke-width="3"/>

  <!-- D1 LED at output -->
  <text x="852" y="300" font-family="ui-monospace, monospace" font-size="16" fill="#15803d">D1</text>
  <polygon points="840,300 840,340 872,320" fill="none" stroke="#1e293b" stroke-width="3"/>
  <line x1="872" y1="300" x2="872" y2="340" stroke="#1e293b" stroke-width="3"/>
  <line x1="872" y1="320" x2="872" y2="470" stroke="#1e293b" stroke-width="3"/>

  <!-- Ground rail -->
  <line x1="120" y1="470" x2="872" y2="470" stroke="#1e293b" stroke-width="3"/>
  <line x1="660" y1="370" x2="660" y2="470" stroke="#1e293b" stroke-width="3"/>
  <line x1="430" y1="470" x2="470" y2="470" stroke="#1e293b" stroke-width="3"/>
  <line x1="438" y1="484" x2="462" y2="484" stroke="#1e293b" stroke-width="3"/>
  <line x1="446" y1="497" x2="454" y2="497" stroke="#1e293b" stroke-width="3"/>
  <text x="424" y="524" font-family="ui-monospace, monospace" font-size="14" fill="#0f172a">GND</text>
</svg>
